<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3" crossorigin="anonymous"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
<script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
</head>
<body class="bg-light">
	<div class="container">
		<main>
			<div class="py-5 text-center">
				<a href="/home"><img class="d-block mx-auto mb-4" src="/image/springboot.png" alt="" width="130"></a>
				<h2>Sign Up</h2>
			</div>

			<div style="margin-left: 350px; margin-right: 350px;">
				<form class="needs-validation" action="/member/enroll" method="POST">
					<div class="row g-3">
						<div class="col-12">
							<label for="id" class="form-label">ID</label>
							<input type="text" class="form-control" id="id" name="id" required>
							<label id="idCheckResult">Please check your ID.</label>
						</div>
						
						<div class="col-12">
							<label for="pwd" class="form-label">PWD</label>
							<input type="password" class="form-control" id="pwd" name="pwd" required>
						</div>
						
						<div class="col-12">
							<label for="pwdConfirm" class="form-label">PWD Confirm</label>
							<input type="password" class="form-control" id="pwdConfirm" required>
						</div>
						
						<div class="col-12">
							<label for="name" class="form-label">NAME</label>
							<input type="text" class="form-control" id="name" name="name" required>
						</div>
						
						<div class="col-12">
							<label for="nickName" class="form-label">NICKNAME</label>
							<input type="text" class="form-control" id="nickName" name="nickName" required>
							<label id="nickNameCheckResult">Please check your NickName.</label>
						</div>

						<div class="col-12">
							<label for="emailId" class="form-label">EMAIL</label>
							<div class="input-group">
								<input type="text" class="form-control" id="emailId" name="emailId">
								<span class="input-group-text">@</span>
								<select name="emailDomain" style="width: 200px;">
									<option>naver.com</option>
									<option>gmail.com</option>
									<option>nate.com</option>
									<option>hanmail.net</option>
								</select>
								<button type="button" class="btn btn-outline-success" id="sendEmail">인증번호</button>
							</div>
						</div>
						
						<div class="col-12">
							<label class="form-label">GENDER</label><br>
							<input type="radio" id="man" name="gender" value="M" checked> MAN &nbsp;&nbsp;&nbsp;&nbsp;
							<input type="radio" id="woman" name="gender" value="F"> WOMAN
						</div>
						
						<div class="col-12">
							<label for="age" class="form-label">AGE</label>
							<input type="number" class="form-control" id="age" name="age" min="0" max="100" value="0">
						</div>

						<div class="col-12">
							<label for="phone" class="form-label">PHONE</label>
							<input type="text" class="form-control" id="phone" name="phone">
						</div>
						
						<div class="col-12">
							<label for="address" class="form-label">ADDRESS</label>
							<input type="text" class="form-control" id="address" name="address">
						</div>
						
						<br><br><br><br><br>
						
						<button class="w-100 btn btn-primary btn-lg">SIGN UP</button>
					</div>
				</form>
			</div>
		</main>

		<footer class="my-5 pt-5 text-muted text-center text-small"></footer>
	</div>
	
	<script>
		window.onload=()=>{

			document.getElementById('id').addEventListener('change',(e)=>{
				checkValue(e.target);
			});
			
			

			document.getElementById('nickName').addEventListener('change',function(){
				checkValue(this);
			});
			let confirmData = '';
			document.getElementById('sendEmail').addEventListener('click',(e)=>{
				const emailId = document.querySelector('#emailId').value.trim();
				if(emailId == ''){
					alert('이메일이 입력되지 않았습니');
					document.querySelector('#emailId').focus();
					
				}else{
					$.ajax({
						url: '/member/echeck',
						data: {email:emailId + '@' + document.querySelector('select[name=emailDomain]').value},
						success: data =>{
							//console.log(data);
							alert('성공적으로 이메일이 발송되었습니다 ');
							const confirmDiv = $(e.target).parent().parent().next(); //sendemail이라는 jqery형
							//console.log(confirmDiv);
							confirmDiv.slideDown();
							confirmData = data;
						},				
						error: data => console.log(data)
					});
				}
			});
			
			document.getElementById('veryfiBtn').addEventListener('click', e=>{
				const verifyNum = e.target.previousElementSibling;
				if(veryfyNum.value.trim()==''){
					alert('인증번호를 입력해주세요. ');
				}else if(confimData == ''){
					alert('이메일 인증을 먼저 진행하세요.')
				}else{
					if(verifyNum.value.trim() == confirmData){
						alert('이메일이 확인되었습니다.');
						verifyNum.disabled = true;
						e.target.disabled = true;
					}else{
						alert('인증번호가 일치하지 않습니다.');
					}
				}
			})
			
		}		
			
			const checkValue = obj =>{
				//console.log(obj);
				const resultLabel = obj.nextElementSibling;
				//console.log(resultLabel);
				if(obj.value.trim() == ''){
					resultLabel.style.color="black";
					resultLabel.innerText = "Please Check Your " + (obj.id == 'id' ? "ID." : "NickName.");
				}else{
					$.ajax({
						url:'/member/checkValue',
						data: {column:obj.id, value:obj.value.trim()},
						success: data =>{
							if(data==0){
								resultLabel.innerText = 'You can use this ' + obj.id + '.';
								resultLabel.style.color = 'green';
							}else{
								resultLabel.innerText = "You can't use this " + obj.id + '.';
								resultLabel.style.color = 'red';
							}
						},
						error: data => console.log(data)
					})
				}
			}
	</script>
</body>
</html>
