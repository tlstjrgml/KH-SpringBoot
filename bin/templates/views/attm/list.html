<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<style>
	.album .col {cursor: pointer;}
	.bd-placeholder-img {font-size: 1.125rem; text-anchor: middle;}
	.card *:hover {cursor: pointer;}
</style>
<title>Insert title here</title>
</head>
<body>
	<div th:replace="~{views/common/navbar.html}"></div>
	<main>
		<section class="py-5 text-center container">
			<div class="row py-lg-5">
				<h1 class="fw-light">Attachment Board</h1>
			</div>
		</section>

		<div class="album py-5 bg-light">
			<div class="container">
				<div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
					<!-- 게시글 개수만큼 div 반복 -->
					<div class="col" th:each="b:${bList}"> <!-- bList와 관련된거를 b라는 변수로 표현 -->
						<div class="card shadow-sm">
						<th:block th:each="a:${aList}" th:if="${b.boardId eq a.refBoardId}">
							<img th:src="@{/}+${a.renameName}" width="100%" height="225" th:if="${#strings.containsIgnoreCase(a.renameName,'jpg') or #strings.containsIgnoreCase(a.renameName,'png')}"/> <!-- 이미지파일인지 확인하는 코드 -->
							<svg class="bd-placeholder-img card-img-top" width="100%" height="225"  th:unless="${#strings.containsIgnoreCase(a.renameName,'jpg') or #strings.containsIgnoreCase(a.renameName,'png')}">  <!-- 이미지파일이 아니면 썸네일 이걸로 -->
								<rect width="100%" height="100%" fill="#55595c" />
								<text x="50%" y="50%" fill="#eceeef" dy=".3em">Thumbnail</text>
							</svg>
							<div class="card-body">
								<p class="card-text">
									<label class="bId">NO. [[${b.boardId}]]</label> | <label class="writer">[[${b.nickName}]]</label>
								</p>
								<div class="d-flex justify-content-between align-items-center">
									[[${b.boardTitle}]] <small class="text-muted">[[${b.boardCount}]] Views</small>
								</div>
							</div>
						</th:block>
						
						</div>
					</div>
					
				</div>
				<br><br><br>
				<nav aria-label="Standard pagination example" style="float: right;">
					<ul class="pagination">
						<li class="page-item">
							<a class="page-link" href="#" aria-label="Previous">
								<span aria-hidden="true">&laquo;</span>
							</a>
						</li>
						
						<li class="page-item">
							<a class="page-link" th:href="@{${loc}(page=${pi.currentPage -1 })}"></a>
						</li>
						<li class="page-item"  th:each="p: ${#numbers.sequence(pi.startPage, pi.endPage)}">
							<a class="page-link">[[${p}]]</a>
						</li>
						<li class="page-item">
							<a class="page-link" th:href="@{${loc}(page=${pi.currentPage + 1})}"></a>
						</li>
						
						<li class="page-item">
							<a class="page-link" href="#" aria-label="Next"> 
								<span aria-hidden="true">&raquo;</span>
							</a>
						</li>
					</ul>
				</nav>
				<button class="btn btn-outline-success" type="button" th:if="${session.loginUser}" onclick="location.href='/attm/write'">WRITE BOARD</button>
			</div>
		</div>
	</main>
	<script th:inline="javascript"> //타임리프를 읽어야하기 때문에 th:inline="jacascript" 사용함
		window.onload=()=>{
			const dives = document.getElementsByClassName('card');
			for(const div of dives){
				div.addEventListener('click', function(){
					const fullId = this.querySelector('.bId').innerText; //NO. 25 형식으로 나옴 숫자만 필요함
					const boardId = fullId.split(' ')[1];
					location.href='/attm/' + boardId + '/' + /*[[${pi.currentPage}]]*/1;					
					
				});
			}
		}
	</script>
</body>
</html>
